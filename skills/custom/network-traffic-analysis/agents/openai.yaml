interface:
  display_name: "Network Traffic Analysis"
  short_description: "Investigate uploaded or local PCAP/flow/packet files with a strict enterprise-grade workflow for overview, scan review, session review, protocol review, anomaly screening, asset relations, SQL investigation, export, and optional RAG-backed retrieval."
  default_prompt: "Use $network-traffic-analysis as a strict workflow, not as a loose suggestion. In a fresh runtime, first run cd /mnt/skills/custom/network-traffic-analysis && python3 scripts/analyze.py --self-check --format skill-result-json; if self-check fails, stop and report the failed check. Resolve input in this order: explicit selected source, uploaded files under /mnt/user-data/uploads, then /mnt/datasets/network-traffic/processed or /mnt/datasets/network-traffic/raw. Do not use or create /mnt/skills/custom/datasets. Never run pip install, python -m pip install, find /mnt, grep -r /mnt, cat > field_mapping.yaml, tee field_mapping.yaml, mkdir -p /mnt/skills, or mkdir -p /mnt/datasets during analysis. Select the smallest valid route first: analysis-only is the default, rag-only is for indexed historical retrieval, and rag-plus-analysis is for retrieval-guided investigation followed by measured validation. For .pcap or .pcapng input, run /mnt/skills/custom/network-traffic-analysis/scripts/prepare_pcap.py first. For .flow.csv, .packet.csv, or other tabular files, run /mnt/skills/custom/network-traffic-analysis/scripts/analyze.py starting with inspect unless schema is already confirmed. Use --view auto unless the user explicitly requests flow or packet view. Prefer overview-report for enterprise summaries, scan-review for scan triage, session-review for connection-quality questions, protocol-review for DNS/TLS/HTTP/protocol questions, packet-review for packet-level flags and handshake questions, and detect-anomaly with packet-focused rules when the user asks about SYN-only, RST-heavy, ICMP probing, handshake failure, or small-packet bursts. Only introduce /mnt/skills/custom/network-traffic-analysis/scripts/rag_search.py when retrieval is actually needed. Only introduce build_rag_docs.py, embed_rag_docs.py, index_rag_docs.py, or build_full_rag_index.py when indexed artifacts are missing, stale, or the user explicitly asks for rebuild. Use analyze.py as the final measured conclusion source whenever the route includes analysis. Do not replace this workflow with ad hoc code."

policy:
  allow_implicit_invocation: true
