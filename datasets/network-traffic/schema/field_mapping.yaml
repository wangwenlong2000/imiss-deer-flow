default_metrics:
  - count
  - sum:bytes
  - sum:packets
  - avg:flow_duration
profiles:
  wireshark_packet:
    canonical_fields:
      timestamp:
        - frame.time_epoch
        - frame.time
        - frame.time_relative
      src_ip:
        - ip.src
        - ipv6.src
      dst_ip:
        - ip.dst
        - ipv6.dst
      src_port:
        - tcp.srcport
        - udp.srcport
      dst_port:
        - tcp.dstport
        - udp.dstport
      protocol:
        - _ws.col.Protocol
        - frame.protocols
        - ip.proto
      frame_len:
        - frame.len
      payload_bytes:
        - tcp.len
        - udp.length
        - ip.len
      tcp_flags:
        - tcp.flags.str
        - tcp.flags
      ttl:
        - ip.ttl
        - ipv6.hlim
      ip_version:
        - ip.version
      icmp_type:
        - icmp.type
      icmp_code:
        - icmp.code
      dns_query:
        - dns.qry.name
      tls_sni:
        - tls.handshake.extensions_server_name
      http_host:
        - http.host
      mac_src:
        - eth.src
      mac_dst:
        - eth.dst
notes:
  - "Add aliases here when a new vendor or export format uses different column names."
  - "Canonical fields are used to build the unified 'flows' view for network-traffic-analysis."
  - "Profiles let the script auto-detect common export formats such as Wireshark/tshark without rewriting source columns."
