      const header = div.querySelector('.legend-header');
      const toggle = () => {
        div.classList.toggle('collapsed');
        if (toggleBtn) {
          toggleBtn.textContent = div.classList.contains('collapsed') ? '展开' : '收起';
        }
      };
      if (toggleBtn) {
        toggleBtn.addEventListener('click', (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
          toggle();
        });
      }
      if (header) {
        header.addEventListener('click', toggle);
      }
      L.DomEvent.disableClickPropagation(div);
      return div;
    };
    legend.addTo(map);
  </script>
</body>
</html>
