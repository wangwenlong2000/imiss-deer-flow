notes:
  - "Add aliases here when a new legal dataset or export format uses different column names."
  - "Canonical fields are used to build the unified 'law_articles' view for law-regulation-rag."
  - "For LeCoQA-style data, 'name' and 'content' are sufficient minimum fields."
  - "If 'law_title' or 'article_no' are missing, the pipeline may derive them from 'name' when possible."